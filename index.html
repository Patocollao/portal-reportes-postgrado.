<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Gestión Académica - ETOP</title>
    <style>
        /* Estilos profesionales para el portal */
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: #1B222C; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        
        #loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #F6C128; text-align: center; transition: opacity 0.5s; z-index: 20;
        }

        /* Iframe que conecta con Hugging Face */
        iframe { width: 100%; height: 100%; border: none; opacity: 0; transition: opacity 1s; }
        .visible { opacity: 1 !important; }

        .spinner {
            border: 4px solid rgba(246, 193, 40, 0.1); border-top: 4px solid #F6C128;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <div style="font-size: 22px; font-weight: bold;">Estableciendo Conexión Segura...</div>
        <div style="font-size: 14px; color: #94a3b8; margin-top: 10px;">Accediendo a través del motor académico Hugging Face</div>
    </div>

    <!-- URL DE TU APP EN HUGGING FACE -->
    <iframe id="appFrame" src="https://tutoria01-portal-etop.hf.space/?embed=true" onload="showApp()"></iframe>

    <script>
        function showApp() {
            // Cuando la app de HF responde, quitamos el cargador
            document.getElementById('loader').style.opacity = '0';
            document.getElementById('appFrame').classList.add('visible');
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 500);
        }
    </script>
</body>
</html>
